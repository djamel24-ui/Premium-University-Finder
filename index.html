<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Malaysia University Programme Finder</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- React + ReactDOM -->
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

<!-- Babel compiler -->
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
/* ==========================================================
   GLOBAL RESET & VARIABLES
   ========================================================== */
:root {
  --bg: #f6f8fa;
  --text: #1a1a1a;
  --card-bg: #ffffff;
  --card-border: #dcdcdc;
  --primary: #0066ff;
  --primary-hover: #004ecc;
  --shadow: rgba(0,0,0,0.08);
  --secondary-text: #666666;
}

html.dark, body.dark {
  --bg: #0f172a;
  --text: #e2e8f0;
  --card-bg: #1e293b;
  --card-border: #334155;
  --primary: #38bdf8;
  --primary-hover: #0ea5e9;
  --shadow: rgba(0,0,0,0.5);
  --secondary-text: #94a3b8;
}

body, html {
  margin: 0;
  padding: 0;
  font-family: "Poppins", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background-color: var(--bg);
  color: var(--text);
  transition: background-color 0.3s ease-in-out, color 0.3s ease-in-out;
  min-height: 100vh;
}

/* ==========================================================
   LAYOUT CONTAINERS
   ========================================================== */
.app-container {
  max-width: 1100px;
  margin: 0 auto;
  padding: 40px 20px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

.main-content {
  flex: 1;
}

/* ==========================================================
   LOGIN SCREEN
   ========================================================== */
.login-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  flex: 1;
  width: 100%;
}
.login-box {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  padding: 40px 30px;
  border-radius: 14px;
  box-shadow: 0 4px 20px var(--shadow);
  text-align: center;
  max-width: 400px;
  width: 100%;
}
.login-input {
  width: 100%;
  padding: 14px;
  margin: 20px 0;
  border-radius: 10px;
  border: 1px solid var(--card-border);
  background: var(--bg);
  color: var(--text);
  font-size: 18px;
  text-align: center;
  letter-spacing: 6px;
  font-weight: bold;
  box-sizing: border-box;
}
.login-input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(0, 102, 255, 0.1); }
.login-btn {
  width: 100%;
  background: var(--primary);
  color: white;
  border: none;
  padding: 14px;
  border-radius: 10px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: 0.2s;
}
.login-btn:hover { background: var(--primary-hover); transform: translateY(-2px); }
.login-error { color: #ef4444; font-size: 14px; margin-bottom: 15px; font-weight: 600; }

/* ==========================================================
   HEADER + LOGO
   ========================================================== */
.header-box { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
.header-logo { width: 70px; height: 70px; object-fit: contain; }
.header-title { font-size: 28px; font-weight: 700; margin: 0; line-height: 1.2; }
.subtitle { font-size: 16px; opacity: 0.8; margin-bottom: 25px; }

/* ==========================================================
   LANGUAGE + DARK MODE BUTTONS
   ========================================================== */
.controls-row { display: flex; gap: 10px; margin-bottom: 25px; justify-content: flex-end;}
.lang-btn, .mode-btn {
  background: var(--primary); border: none; padding: 10px 18px;
  color: white; font-size: 14px; border-radius: 10px;
  cursor: pointer; transition: 0.2s; font-weight: 500;
}
.lang-btn:hover, .mode-btn:hover { background: var(--primary-hover); transform: translateY(-1px); box-shadow: 0 4px 10px rgba(0,0,0,0.15); }

/* ==========================================================
   SEARCH + SELECT INPUTS
   ========================================================== */
.input-card {
  background: var(--card-bg); border: 1px solid var(--card-border);
  padding: 25px; border-radius: 14px; box-shadow: 0 4px 15px var(--shadow);
  margin-bottom: 25px;
}
.filter-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 18px; }
.input-label { font-size: 14px; font-weight: 600; margin-bottom: 8px; display: block; color: var(--text); }
.input-box, .select-box {
  width: 100%; padding: 12px; border-radius: 10px;
  border: 1px solid var(--card-border); background: var(--bg);
  color: var(--text); font-size: 14px; box-sizing: border-box;
}
.input-box:focus, .select-box:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(0, 102, 255, 0.1); }

/* ==========================================================
   FILTER / SORT BAR & NOTICES
   ========================================================== */
.accreditation-notice {
  background: rgba(0, 102, 255, 0.1); border-left: 5px solid var(--primary);
  padding: 18px; border-radius: 8px; margin-bottom: 25px; font-size: 14px; color: var(--text); line-height: 1.5;
}
.filter-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
.sort-wrapper { display: flex; align-items: center; gap: 10px; }
.sort-select {
  padding: 8px 12px; border-radius: 8px; border: 1px solid var(--card-border);
  background: var(--bg); color: var(--text); font-size: 14px;
}

/* ==========================================================
   RESULT TITLE
   ========================================================== */
.result-title { font-size: 20px; font-weight: 700; color: var(--text); margin: 0; }
.result-highlight { color: var(--primary); }

/* ==========================================================
   UNIVERSITY CARDS GRID
   ========================================================== */
.uni-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; margin-bottom: 40px; }
.uni-card {
  background: var(--card-bg); border: 1px solid var(--card-border);
  padding: 22px; border-radius: 14px; box-shadow: 0 4px 15px var(--shadow);
  transition: all 0.2s ease; display: flex; flex-direction: column;
}
.uni-card:hover { transform: translateY(-4px); border-color: var(--primary); box-shadow: 0 8px 20px var(--shadow); }
.uni-name { font-size: 18px; font-weight: 700; margin-bottom: 12px; color: var(--primary); line-height: 1.3; }
.uni-small { font-size: 13px; color: var(--secondary-text); margin-bottom: 5px; }

/* ==========================================================
   PROGRAMME LIST INSIDE CARD
   ========================================================== */
.prog-list {
  margin-top: 15px; margin-bottom: 20px; border-top: 1px solid var(--card-border);
  padding-top: 15px; max-height: 280px; overflow-y: auto; padding-right: 5px;
}
.prog-list::-webkit-scrollbar { width: 6px; }
.prog-list::-webkit-scrollbar-track { background: transparent; }
.prog-list::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
.dark .prog-list::-webkit-scrollbar-thumb { background: #475569; }

.prog-item {
  background: var(--bg); padding: 12px; border-radius: 8px;
  margin-bottom: 12px; border: 1px solid var(--card-border);
}
.prog-item-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 6px; line-height: 1.4; }
.prog-item-specs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
.spec-badge {
  font-size: 11px; background: var(--card-bg); padding: 4px 8px;
  border-radius: 6px; color: var(--secondary-text); border: 1px solid var(--card-border);
  display: inline-flex; align-items: center;
}
.prog-item-price { font-size: 13px; color: var(--primary); font-weight: 700; }

/* ==========================================================
   WEBSITE LINK BUTTON
   ========================================================== */
.website-link {
  display: block; margin-top: auto; padding: 12px 14px;
  background: var(--primary); color: white; text-decoration: none;
  border-radius: 8px; font-size: 14px; font-weight: 600;
  transition: 0.2s; text-align: center;
}
.website-link:hover { background: var(--primary-hover); transform: translateY(-2px); }

/* ==========================================================
   EMPTY RESULT MESSAGE
   ========================================================== */
.no-result {
  color: #ef4444; font-size: 15px; margin-top: 20px; text-align: center;
  padding: 20px; background: rgba(239, 68, 68, 0.1); border-radius: 10px; font-weight: 600;
}
.info-message {
  color: var(--text); opacity: 0.7; font-size: 15px; margin-top: 20px;
  text-align: center; padding: 30px; background: var(--card-bg); border-radius: 10px; border: 1px solid var(--card-border);
}

/* ==========================================================
   FOOTER
   ========================================================== */
.app-footer {
  text-align: center;
  padding: 25px 20px;
  margin-top: auto; /* Push to bottom */
  border-top: 1px solid var(--card-border);
  color: var(--secondary-text);
  font-size: 14px;
  font-weight: 500;
}

/* ==========================================================
   RTL SUPPORT FOR ARABIC
   ========================================================== */
.rtl { direction: rtl; text-align: right; }
.ltr { direction: ltr; text-align: left; }

/* ==========================================================
   RESPONSIVE
   ========================================================== */
@media (max-width: 768px) {
  .header-title { font-size: 24px; }
  .uni-grid { grid-template-columns: 1fr; }
  .controls-row { flex-direction: column; }
  .filter-grid { grid-template-columns: 1fr; }
  .filter-bar { flex-direction: column; align-items: flex-start; }
  .sort-wrapper { width: 100%; justify-content: space-between; }
  .sort-select { flex: 1; }
}
</style>
</head>

<script type="text/babel">

/* ============================================
   PROGRAMME SPECS ESTIMATOR (Duration & IELTS)
============================================ */
function getProgramSpecs(progName, lang) {
  const lower = progName.toLowerCase();
  let durEn = "Check Website", ielts = "Check Website";

  if (lower.includes("foundation") || lower.includes("certificate") || lower.includes("a-level") || lower.includes("ausmat")) {
    durEn = "1 Year";
    ielts = "5.0 - 5.5";
  } else if (lower.includes("diploma")) {
    durEn = (lower.includes("nursing") || lower.includes("medical") || lower.includes("health")) ? "3 Years" : "2 - 2.5 Years";
    ielts = "5.0 - 5.5";
  } else if (lower.includes("doctor of medicine") || lower.includes("mbbs") || lower.includes("dental") || lower.includes("dentistry")) {
    if (lower.includes("master") || lower.includes("phd") || lower.includes("doctor in") || lower.includes("doctorate")) {
        durEn = "3 - 4 Years";
        ielts = "6.0 - 7.0";
    } else {
        durEn = "5 Years";
        ielts = "6.0 - 7.0";
    }
  } else if (lower.includes("bachelor") || lower.includes("bsc") || lower.includes("ba ") || lower.includes("bba") || lower.match(/\b(beng|bmus|bca)\b/)) {
    if (lower.includes("engineering") || lower.includes("pharmacy") || lower.includes("law ") || lower.includes("dentistry")) {
      durEn = "4 Years";
      ielts = "6.0";
    } else if (lower.includes("architecture")) {
      durEn = "3 - 4 Years";
      ielts = "6.0";
    } else {
      durEn = "3 - 3.5 Years";
      ielts = "5.5 - 6.0";
    }
  } else if (lower.includes("master") || lower.includes("msc") || lower.includes("mba") || lower.match(/\b(mmed|mphil|ma)\b/)) {
    durEn = "1 - 2 Years";
    ielts = "6.0 - 6.5";
  } else if (lower.includes("phd") || lower.includes("doctor of philosophy") || lower.includes("dba") || lower.includes("doctor of business") || lower.includes("doctor of education") || lower.includes("doctor of technology")) {
    durEn = "3 - 4 Years";
    ielts = "6.0 - 6.5";
  }

  let durAr = durEn.replace("Years", "سنوات").replace("Year", "سنة").replace("Check Website", "راجع الموقع");
  let ieltsAr = ielts === "Check Website" ? "راجع الموقع" : ielts;

  return {
    duration: lang === "ar" ? durAr : durEn,
    ielts: lang === "ar" ? ieltsAr : ielts
  };
}

      "BSc (Hons) Actuarial Science with Data Analytics": "79,350",
      "Bachelor of Nursing (Hons)": "74,010",
      "BA (Hons) Culinary Management (KL Campus)": "73,100",
      "BA (Hons) Interior Architecture": "73,000",
      "Bachelor of Hospitality Administration": "72,050",
      "BA (Hons) Fashion Design with Marketing": "71,850",
      "BA (Hons) Hospitality Management (Springhill Campus)": "71,941",
      "BCA (Hons) 3D Animation Design": "70,850",
      "BSc (Hons) Actuarial Science / Actuarial Science & Finance": "68,900",
      "BA (Hons) Psychology": "68,730",
      "BA (Hons) Game Design": "68,415",
      "BA (Hons) Mass Communication": "68,330",
      "BA (Hons) Multimedia Design": "68,070",
      "Bachelor of Arts (Honours) Entrepreneurship": "67,950",
      "Bachelor of International and Sustainable Business (Honours)": "67,440",
      "BA (Hons) Accounting / Accounting & Finance": "67,380",
      "Bachelor of Financial Technology (Honours)": "66,490",
      "Bachelor of Computer Science (Honours) / Mobile Computing / Business Information System": "65,820",
      "BA (Hons) Branding & Advertising": "65,550",
      "BSc (Hons) Finance & Investment / BA (Hons) Marketing / Logistics Management": "65,400 - 65,490",
      "Bachelor of Computer Science in Data Science with Honours": "69,040",
      "BA (Hons) English Language and Communication": "61,300",
      "Diploma in Nursing": "54,140",
      "Diploma in Pharmacy / Cosmetic Science / Packaging Science": "51,510 - 51,650",
      "Diploma in Music Performance": "51,240",
      "Diploma in Fashion Design": "48,420",
      "Diploma in Architectural Studies": "49,995",
      "Diploma in Interior Architecture": "46,395",
      "Diploma of Engineering Technology (Industrial Design)": "45,530",
      "Foundation in Science / Music": "20,700 - 24,200",
      "Foundation in Arts": "20,000",
      "Doctor of Philosophy (Medical Sciences)": "68,900",
      "Doctor of Philosophy (Business and Management)": "45,468 (53,343 with bridging)",
      "Doctor of Business Administration (DBA)": "71,600 (82,100 with bridging)",
      "Doctor of Philosophy in Hospitality and Tourism": "60,000",
      "Master of Clinical Psychology": "56,350 (61,550 with bridging)",
      "Master of Business Administration (MBA)": "43,760 (47,240 with bridging)"
    }
  }
];

const allProgrammes = Array.from(new Set(rawData.flatMap(u => Object.keys(u.programmes)))).sort();

// ==========================================================
//     MAIN REACT APPLICATION (UI + Logic)
// ==========================================================

function App() {
  const [isAuthenticated, setIsAuthenticated] = React.useState(false);
  const [passwordInput, setPasswordInput] = React.useState("");
  const [passError, setPassError] = React.useState(false);

  const [search, setSearch] = React.useState("");
  const [selectedSpecialty, setSelectedSpecialty] = React.useState("");
  const [selectedLevel, setSelectedLevel] = React.useState(""); 
  const [selectedType, setSelectedType] = React.useState(""); 
  const [selectedMode, setSelectedMode] = React.useState(""); 
  const [selectedDuration, setSelectedDuration] = React.useState(""); 
  const [selectedAccreditation, setSelectedAccreditation] = React.useState("");
  const [sortOption, setSortOption] = React.useState("default"); 
  const [lang, setLang] = React.useState("en");
  const [darkMode, setDarkMode] = React.useState(false);

  const t = (en, ar) => (lang === "en" ? en : ar);

  React.useEffect(() => {
    if (darkMode) {
      document.documentElement.classList.add('dark');
      document.body.classList.add('dark');
    } else {
      document.documentElement.classList.remove('dark');
      document.body.classList.remove('dark');
    }
  }, [darkMode]);

  const handleLogin = (e) => {
    e.preventDefault();
    if (passwordInput === "2026") {
      setIsAuthenticated(true);
      setPassError(false);
    } else {
      setPassError(true);
    }
  };

  // Helper to determine if a programme matches a specific study level
  const levelMatch = (progName, level) => {
    if (!level) return true;
    const lowerName = progName.toLowerCase();
    
    if (level === "Foundation") {
      return lowerName.includes("foundation") || lowerName.includes("certificate") || lowerName.includes("a-level") || lowerName.includes("ausmat");
    }
    if (level === "Diploma") {
      return lowerName.includes("diploma") && !lowerName.includes("postgraduate");
    }
    if (level === "Bachelor") {
      if (lowerName.includes("doctor of medicine") || lowerName.includes("doctor of dental")) return true;
      return lowerName.includes("bachelor") || lowerName.includes("degree") || /\b(bsc|ba|beng|bba|bca|bmus|bds|mbbs|md)\b/.test(lowerName);
    }
    if (level === "Master") {
      return lowerName.includes("master") || lowerName.includes("postgraduate") || /\b(msc|mba|mmed|mphil|ma)\b/.test(lowerName);
    }
    if (level === "PhD") {
      if (lowerName.includes("doctor of medicine") || lowerName.includes("doctor of dental")) return false;
      return lowerName.includes("doctor") || lowerName.includes("phd") || /\b(dba|edd|deng|dtm|drph)\b/.test(lowerName);
    }
    return true;
  };

  // Helper to extract numeric price for sorting
  const getPriceNum = (str) => {
    if (!str) return Infinity;
    const firstPart = str.split('-')[0]; 
    const match = firstPart.replace(/,/g, '').match(/\d+(\.\d+)?/);
    let val = match ? parseFloat(match[0]) : Infinity;
    if (str.includes("USD")) val *= 4.5; // rough conversion to RM to keep sorting accurate
    return isNaN(val) ? Infinity : val;
  };

  // Derive which programmes match the current filters
  const matchingUniversities = React.useMemo(() => {
    let universities = JSON.parse(JSON.stringify(rawData)); // deep copy

    const searchTokens = search.toLowerCase().trim().split(/\s+/).filter(k => k.length > 0);
    const specKeywords = (selectedSpecialty && SPECIALTIES[selectedSpecialty]) ? SPECIALTIES[selectedSpecialty].keywords : null;

    universities.forEach(u => {
      // 1. Institution Type Match (Public/Private)
      const uniType = universityTypes[u.shortName] || u.type;
      if (selectedType && uniType !== selectedType) {
        u.programmes = {};
        return;
      }

      // 2. Accreditation (Allowed Universities check)
      if (selectedAccreditation) {
        const rules = ACCREDITATION_RULES[selectedAccreditation];
        if (rules.allowedUnis && !rules.allowedUnis.includes(u.shortName)) {
          u.programmes = {};
          return;
        }
      }

      const filteredProgs = {};
      let minPriceForUni = Infinity;
      let maxPriceForUni = -Infinity;

      for (const [progName, price] of Object.entries(u.programmes)) {
        const lowerName = progName.toLowerCase();
        const specs = getProgramSpecs(progName, "en"); // Get duration/IELTS info
        
        // 3. Level Match
        if (selectedLevel && !levelMatch(progName, selectedLevel)) continue;

        // 4. Specialty Match
        if (specKeywords && !specKeywords.some(kw => lowerName.includes(kw))) continue;

        // 5. Smart Keyword Search Match (Token by Token + Synonyms)
        if (searchTokens.length > 0) {
          const translatedP = translateProgramName(progName, "ar").toLowerCase();
          
          const matchesSearch = searchTokens.every(token => {
             const synonymsForToken = getSynonyms(token);
             return synonymsForToken.some(syn => lowerName.includes(syn) || translatedP.includes(syn));
          });

          if (!matchesSearch) continue;
        }

        // 6. Duration Match
        if (selectedDuration && !specs.duration.includes(selectedDuration)) continue;

        // 7. Study Mode Match
        if (selectedMode) {
          const isPostGrad = lowerName.includes("master") || lowerName.includes("phd") || lowerName.includes("doctor");
          if (selectedMode === "Research" && !lowerName.includes("research")) continue;
          if (selectedMode === "Mixed" && !lowerName.includes("mixed")) continue;
          if (selectedMode === "Coursework") {
            if (isPostGrad && !lowerName.includes("coursework") && !lowerName.includes("mixed") && lowerName.includes("research")) {
              continue; 
            }
            if (isPostGrad && lowerName.includes("research")) continue;
          }
        }

        // 8. Accreditation Rules check on programs
        if (selectedAccreditation === "Oman") {
          if ((lowerName.includes("mbbs") || lowerName.includes("doctor of medicine") || lowerName.includes("bachelor of medicine") || lowerName.includes("dental surgery")) && !lowerName.includes("phd")) {
            continue;
          }
          if (u.shortName === "APU" && !levelMatch(progName, "PhD")) continue;
          if (u.shortName === "UCSI" && (lowerName === "dba" || lowerName.includes("doctor of business administration"))) continue;
        }

        if (selectedAccreditation === "Saudi Arabia") {
          if (lowerName.includes("odl") || lowerName.includes("online") || lowerName.includes("on-line") || lowerName.includes("distance")) {
            continue;
          }
        }

        // Price calculations for smart sorting
        const numPrice = getPriceNum(price);
        if (numPrice < minPriceForUni) minPriceForUni = numPrice;
        if (numPrice !== Infinity && numPrice > maxPriceForUni) maxPriceForUni = numPrice;

        // If all filters pass, keep the programme
        filteredProgs[progName] = price;
      }
      
      u.programmes = filteredProgs;
      u.minPrice = minPriceForUni;
      u.maxPrice = maxPriceForUni === -Infinity ? Infinity : maxPriceForUni;
    });

    // Remove universities that have 0 matched programmes
    universities = universities.filter(u => Object.keys(u.programmes).length > 0);

    // Sort Universities
    if (sortOption === "default") return universities;

    return universities.sort((a, b) => {
      if (sortOption === "type") {
        const typeA = universityTypes[a.shortName] || a.type;
        const typeB = universityTypes[b.shortName] || b.type;
        return typeA.localeCompare(typeB);
      }
      if (sortOption === "priceAsc") {
        return a.minPrice - b.minPrice;
      }
      if (sortOption === "priceDesc") {
        const aVal = a.maxPrice === Infinity ? -1 : a.maxPrice;
        const bVal = b.maxPrice === Infinity ? -1 : b.maxPrice;
        return bVal - aVal;
      }
      return 0;
    });
  }, [search, selectedSpecialty, selectedLevel, selectedType, selectedMode, selectedDuration, selectedAccreditation, sortOption]);

  const logoSrc = darkMode 
    ? "https://image2url.com/r2/default/images/1773802956881-f5bfcde7-3167-4dea-962a-7b999e8bb9fb.png" 
    : "https://marine-white-7l1epbg2wn.edgeone.app/cropped-Untitled-design-1_prev_ui-removebg-preview.png";

  // LOGIN SCREEN
  if (!isAuthenticated) {
    return (
      <div className="theme-wrapper" dir={lang === "ar" ? "rtl" : "ltr"}>
        <div className="controls-row" style={{padding: "20px"}}>
          <button className="lang-btn" onClick={() => setLang(lang === "en" ? "ar" : "en")}>{t("عربي", "English")}</button>
          <button className="mode-btn" onClick={() => setDarkMode(!darkMode)}>
            {darkMode ? t("Light Mode", "وضع النهار") : t("Dark Mode", "وضع الليل")}
          </button>
        </div>
        <div className="login-container">
          <div className="login-box">
            <img className="header-logo" style={{margin: "0 auto 15px", width:"90px", height:"90px"}} src={logoSrc} alt="Logo" />
            <h2 style={{margin: "0 0 10px 0"}}>{t("Premium Language Centre", "مركز بريميوم للغات")}</h2>
            <p style={{margin: "0 0 20px 0", fontSize: "14px", opacity: 0.8}}>{t("Malaysia University Finder", "نظام البحث عن الجامعات الماليزية")}</p>
            <form onSubmit={handleLogin}>
              <input 
                type="password" 
                className="login-input" 
                placeholder={t("Enter Pin Code", "أدخل الرمز السري")} 
                value={passwordInput}
                onChange={(e) => setPasswordInput(e.target.value)}
              />
              {passError && <div className="login-error">{t("Incorrect PIN. Try again.", "الرمز السري خاطئ. حاول مرة أخرى.")}</div>}
              <button type="submit" className="login-btn">{t("Login", "دخول")}</button>
            </form>
          </div>
        </div>
      </div>
    );
  }

  // MAIN APP SCREEN
  return (
    <div className="theme-wrapper" dir={lang === "ar" ? "rtl" : "ltr"}>
      <div className="app-container">
        
        <div className="main-content">
          {/* HEADER */}
          <div className="header-box">
            <img className="header-logo" src={logoSrc} alt="Logo" />
            <h1 className="header-title">{t("Malaysia University Programme Finder", "البحث عن البرامج الجامعية في ماليزيا")}</h1>
          </div>

          <p className="subtitle">
            {t("Search any program to see all universities offering it side-by-side.", "ابحث عن أي برنامج لرؤية جميع الجامعات التي تقدمه جنبًا إلى جنب.")}
          </p>

          {/* TOGGLE BUTTONS */}
          <div className="controls-row">
            <button className="lang-btn" onClick={() => setLang(lang === "en" ? "ar" : "en")}>
              {t("عربي", "English")}
            </button>
            <button className="mode-btn" onClick={() => setDarkMode(!darkMode)}>
              {darkMode ? t("Light Mode", "وضع النهار") : t("Dark Mode", "وضع الليل")}
            </button>
          </div>

          {/* SEARCH AREA (GRID) */}
          <div className="input-card">
            <div className="filter-grid">
              
              {/* Accreditation */}
              <div>
                <label className="input-label">{t("Accreditation", "الاعتماد الأكاديمي")}</label>
                <select className="select-box" value={selectedAccreditation} onChange={(e) => setSelectedAccreditation(e.target.value)}>
                  <option value="">{t("Any Country (No Filter)", "جميع الدول (بدون تصفية)")}</option>
                  {Object.keys(ACCREDITATION_RULES).map(country => (
                    <option key={country} value={country}>{t(country, country === "Oman" ? "عُمان" : country === "UAE" ? "الإمارات" : country === "Saudi Arabia" ? "السعودية" : "العراق")}</option>
                  ))}
                </select>
              </div>

              {/* Specialty / Field of Study */}
              <div>
                <label className="input-label">{t("Field of Study / Specialty", "التخصص الدراسي")}</label>
                <select className="select-box" value={selectedSpecialty} onChange={(e) => setSelectedSpecialty(e.target.value)}>
                  <option value="">{t("All Specialties (80+ Options)", "جميع التخصصات (أكثر من 80 تخصص)")}</option>
                  {Object.keys(SPECIALTIES).sort().map(spec => (
                    <option key={spec} value={spec}>{t(spec, SPECIALTIES[spec].ar)}</option>
                  ))}
                </select>
              </div>

              {/* Level */}
              <div>
                <label className="input-label">{t("Study Level", "مستوى الدراسة")}</label>
                <select className="select-box" value={selectedLevel} onChange={(e) => setSelectedLevel(e.target.value)}>
                  <option value="">{t("All Levels", "جميع المستويات")}</option>
                  <option value="Foundation">{t("Foundation & Certificate", "السنة التأسيسية والشهادات")}</option>
                  <option value="Diploma">{t("Diploma", "دبلوم")}</option>
                  <option value="Bachelor">{t("Bachelor's Degree", "بكالوريوس")}</option>
                  <option value="Master">{t("Master's Degree", "ماجستير")}</option>
                  <option value="PhD">{t("PhD & Doctorate", "دكتوراه")}</option>
                </select>
              </div>

              {/* Institution Type */}
              <div>
                <label className="input-label">{t("Institution Type", "نوع المؤسسة")}</label>
                <select className="select-box" value={selectedType} onChange={(e) => setSelectedType(e.target.value)}>
                  <option value="">{t("All Types", "جميع الأنواع")}</option>
                  <option value="Public">{t("Public", "حكومي")}</option>
                  <option value="Private">{t("Private", "خاص")}</option>
                </select>
              </div>

              {/* Study Mode */}
              <div>
                <label className="input-label">{t("Study Mode", "نظام الدراسة")}</label>
                <select className="select-box" value={selectedMode} onChange={(e) => setSelectedMode(e.target.value)}>
                  <option value="">{t("All Modes", "جميع الأنظمة")}</option>
                  <option value="Coursework">{t("Coursework", "مواد دراسية")}</option>
                  <option value="Research">{t("Research", "بحث علمي")}</option>
                  <option value="Mixed">{t("Mixed Mode", "نظام مختلط")}</option>
                </select>
              </div>

              {/* Duration */}
              <div>
                <label className="input-label">{t("Duration (Years)", "مدة الدراسة")}</label>
                <select className="select-box" value={selectedDuration} onChange={(e) => setSelectedDuration(e.target.value)}>
                  <option value="">{t("Any Duration", "أي مدة")}</option>
                  <option value="1">{t("1 Year", "سنة واحدة")}</option>
                  <option value="2">{t("2 Years", "سنتين")}</option>
                  <option value="3">{t("3 Years", "3 سنوات")}</option>
                  <option value="4">{t("4 Years", "4 سنوات")}</option>
                  <option value="5">{t("5 Years", "5 سنوات")}</option>
                </select>
              </div>

              {/* Keyword */}
              <div style={{ gridColumn: "1 / -1" }}>
                <label className="input-label">{t("Keyword Search", "البحث السريع")}</label>
                <input
                  className="input-box"
                  type="text"
                  placeholder={t("e.g. Medicine, Dentistry, AI...", "مثل: الطب، صيدلة، الذكاء الاصطناعي...")}
                  value={search}
                  onChange={(e) => setSearch(e.target.value)}
                />
              </div>

            </div>
          </div>

          {/* ACCREDITATION NOTICES */}
          {selectedAccreditation && ACCREDITATION_RULES[selectedAccreditation] && (
            <div className="accreditation-notice">
              {t(ACCREDITATION_RULES[selectedAccreditation].notice.en, ACCREDITATION_RULES[selectedAccreditation].notice.ar)}
            </div>
          )}

          {/* RESULTS TITLE & SORT BAR */}
          <div className="filter-bar">
             <h2 className="result-title">
               {t("Matching Universities:", "الجامعات المطابقة:")} <span className="result-highlight">{matchingUniversities.length}</span>
             </h2>

             {matchingUniversities.length > 0 && (
               <div className="sort-wrapper">
                 <span className="input-label" style={{marginBottom:0}}>
                   {t("Sort By:", "ترتيب حسب:")}
                 </span>
                 <select className="sort-select" value={sortOption} onChange={(e) => setSortOption(e.target.value)}>
                   <option value="default">{t("Default", "افتراضي")}</option>
                   <option value="priceAsc">{t("Price (Low to High)", "السعر (من الأقل للأعلى)")}</option>
                   <option value="priceDesc">{t("Price (High to Low)", "السعر (من الأعلى للأقل)")}</option>
                   <option value="type">{t("Type (Public/Private)", "النوع (حكومي/خاص)")}</option>
                 </select>
               </div>
             )}
          </div>

          {/* RESULTS AREA */}
          {matchingUniversities.length === 0 ? (
            <p className="no-result">
              {t("No universities found for this specific search.", "لم يتم العثور على جامعات لهذا البحث المحدد.")}
            </p>
          ) : (
            <div className="uni-grid">
              {matchingUniversities.map((u) => (
                <div key={u.university} className="uni-card">
                  <div className="uni-name">{u.university}</div>
                  
                  <div className="uni-small">
                    <strong>{t("Type", "النوع")}:</strong> {universityTypes[u.shortName] || u.type}
                  </div>

                  <div className="prog-list">
                    {Object.entries(u.programmes).map(([progName, priceStr]) => {
                      const specs = getProgramSpecs(progName, lang);
                      return (
                      <div key={progName} className="prog-item">
                        <div className="prog-item-title">
                          {translateProgramName(progName, lang)}
                        </div>
                        
                        <div className="prog-item-specs">
                          <span className="spec-badge">⏳ {t("Duration:", "المدة:")} {specs.duration}</span>
                          <span className="spec-badge">📝 {t("IELTS:", "الآيلتس:")} {specs.ielts}</span>
                        </div>

                        <div className="prog-item-price">
                          {priceStr.includes("USD") || priceStr.includes("MYR") || priceStr.includes("RM") || priceStr.includes("Credits") 
                            ? priceStr 
                            : priceStr + " " + u.currency}
                        </div>
                      </div>
                    )})}
                  </div>
                  
                  <a href={u.website} target="_blank" rel="noopener noreferrer" className="website-link">
                    {t("Visit Website", "زيارة الموقع")}
                  </a>
                </div>
              ))}
            </div>
          )}

        </div> {/* End main-content */}
        
        {/* FOOTER */}
        <footer className="app-footer">
          Copyright © 2026 Premium Language Centre. All rights reserved.
        </footer>

      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>

</body>
</html>
